<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status Page</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #1a1a2e;
      color: #eee;
    }
    .card {
      background: #16213e;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      border-left: 6px solid #2d6a4f;
    }
    .env-badge {
      display: inline-block;
      background: #2d6a4f;
      color: white;
      padding: 4px 16px;
      border-radius: 20px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    .version { color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <span class="env-badge">GREEN Environment</span>
    <h1>All Systems Operational</h1>
    <p>Version 2.0.0 — Deployed to Green</p>
    <p class="version">Build: green-20260226-001</p>
  </div>
</body>
</html>
